<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON DODGE X</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:sans-serif;
}

canvas{display:block;}

.overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
max-width:500px;
}

button{
margin-top:20px;
padding:10px 25px;
font-size:18px;
}

.hidden{display:none;}

.hud{
position:absolute;
top:10px;
left:10px;
font-size:16px;
}

.reviveText{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
color:lime;
display:none;
}
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>

<div id="reviveText" class="reviveText">REVIVE!</div>

<div id="startScreen" class="overlay">
<h1>NEON DODGE X</h1>
<p>
マウス / 指で左右移動できるよ<br>
赤い敵は避けろ<br>
黄色アイテムはバリアを付与してくれる<br>
</p>
<button onclick="startGame()">START</button>
</div>

<div id="gameOver" class="overlay hidden">
<h1>GAME OVER</h1>
<p id="finalScore"></p>
<button onclick="restartGame()">RESTART</button>
</div>

<div class="hud" id="hud">SCORE:0</div>

<script>

const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let player,enemies,items,bullets,killerEnemies;

let gameRunning=false;
let lastMouseX=null;

let score=0;
let highScore=0;

let shieldCount=0;
const MAX_SHIELD=3;

let globalSpeed=1.6;

let spawnTimer=0;
let spawnInterval=240;
let gameTime=0;

let isInvincible=false;
let invincibleTimer=0;

let lastScoreCheck=0;

function initGame(){

player={
x:canvas.width/2,
y:canvas.height-60,
size:20
};

enemies=[];
items=[];
bullets=[];
killerEnemies=[];

score=0;
shieldCount=0;

globalSpeed=1.6;

spawnTimer=0;
spawnInterval=240;
gameTime=0;

isInvincible=false;
invincibleTimer=0;

lastScoreCheck=0;

highScore=Number(localStorage.getItem("neonHighScore"))||0;

updateHUD();
}

function updateHUD(){
document.getElementById("hud").innerText=
"SCORE:"+Math.floor(score)+" HIGH:"+highScore+" SHIELD:"+shieldCount+"/3";
}

function spawnEnemy(){

if(enemies.length>100)return;

let spawnCount=Math.min(4,1+Math.floor(gameTime/1400));

for(let i=0;i<spawnCount;i++){

let size=16+Math.random()*22;

let type="normal";
if(Math.random()<0.08) type="burst";
if(Math.random()<0.06) type="clone"; // ★分身敵

enemies.push({

x:Math.random()*canvas.width,
y:-size-Math.random()*200,

size:size,
type:type,
exploded:false,

baseSpeed:(5+Math.random()*3)*(28/size),
speedFactor:0.06+Math.random()*0.04,

isFeint:Math.random()<0.6,
feinted:false,
feintPower:(Math.random()*240)-120,

// ★分身用
clones:[],
hasCloned:false

});
}

if(Math.random()<0.15){
items.push({
x:Math.random()*canvas.width,
y:-20,
size:20,
speed:8
});
}
}

/* ★分身生成 */
function spawnClones(enemy){

let count=2+Math.floor(Math.random()*3);

for(let i=0;i<count;i++){
enemy.clones.push({
offsetX:(Math.random()*120)-60,
offsetY:(Math.random()*80)-40
});
}
}

function spawnBurst(enemy){
let count=10;
for(let i=0;i<count;i++){
let angle=(Math.PI*2/count)*i;
bullets.push({
x:enemy.x,
y:enemy.y,
vx:Math.cos(angle)*5,
vy:Math.sin(angle)*5,
size:5
});
}
}

function spawnKillerEnemy(){
killerEnemies.push({
x:Math.random()*canvas.width,
y:-20,
size:10,
speed:40,
warning:true,
timer:7
});
}

canvas.addEventListener("mousemove",e=>{
if(!gameRunning)return;
const rect=canvas.getBoundingClientRect();
let currentX=e.clientX-rect.left;
if(lastMouseX!==null){
player.x+=currentX-lastMouseX;
}
lastMouseX=currentX;
});

canvas.addEventListener("mouseleave",()=>lastMouseX=null);

canvas.addEventListener("touchmove",e=>{
if(!gameRunning)return;
e.preventDefault();
const rect=canvas.getBoundingClientRect();
let touchX=e.touches[0].clientX-rect.left;
player.x=touchX; // 安定化
});

function update(){

if(!gameRunning)return;

ctx.clearRect(0,0,canvas.width,canvas.height);

player.y=canvas.height-60;

if(player.x<player.size/2)player.x=player.size/2;
if(player.x>canvas.width-player.size/2)
player.x=canvas.width-player.size/2;

/* プレイヤー描画 */
ctx.fillStyle=isInvincible?"white":(shieldCount>0?"yellow":"cyan");
ctx.fillRect(player.x-player.size/2,player.y-player.size/2,player.size,player.size);

/* 敵 */
for(let i=enemies.length-1;i>=0;i--){

let enemy=enemies[i];

let dynamicSpeed=
enemy.baseSpeed+
Math.sin(enemy.y*enemy.speedFactor)*2;

enemy.y+=dynamicSpeed+globalSpeed*0.3;

/* フェイント */
if(enemy.isFeint && !enemy.feinted && enemy.y>canvas.height/3){
enemy.x+=enemy.feintPower;
enemy.feinted=true;
}

/* ★分身発動 */
if(enemy.type==="clone" && !enemy.hasCloned && enemy.y>canvas.height/4){
spawnClones(enemy);
enemy.hasCloned=true;
}

/* 本体描画 */
ctx.beginPath();
ctx.fillStyle=(enemy.type==="burst")?"purple":
(enemy.type==="clone"?"cyan":"red");
ctx.arc(enemy.x,enemy.y,enemy.size/2,0,Math.PI*2);
ctx.fill();

/* ★分身描画 */
if(enemy.type==="clone"){
ctx.fillStyle="rgba(0,255,255,0.3)";
for(let c of enemy.clones){

// 少し揺らす
c.offsetX += Math.sin(enemy.y*0.05)*0.3;

ctx.beginPath();
ctx.arc(
enemy.x+c.offsetX,
enemy.y+c.offsetY,
enemy.size/2,
0,
Math.PI*2
);
ctx.fill();
}
}

/* バースト */
if(enemy.type==="burst" && enemy.y>canvas.height*0.6 && !enemy.exploded){
spawnBurst(enemy);
enemy.exploded=true;
enemies.splice(i,1);
continue;
}

/* 当たり判定 */
let dx=player.x-enemy.x;
let dy=player.y-enemy.y;
let distSq=dx*dx+dy*dy;

if(!isInvincible && distSq<(player.size/2+enemy.size/2)**2){

if(shieldCount>0){
shieldCount--;
enemies.splice(i,1);
updateHUD();
continue;
}

if(Math.random()<0.5){
shieldCount=1;
isInvincible=true;
invincibleTimer=300;
showRevive();
enemies.splice(i,1);
continue;
}

gameOver();
}

if(enemy.y>canvas.height){
enemies.splice(i,1);
}
}

/* 以下そのまま（弾・即死敵・アイテムなど） */

score+=0.12;

let currentScore=Math.floor(score);

if(currentScore%50===0 && currentScore!==0 && currentScore!==lastScoreCheck){
spawnKillerEnemy();
lastScoreCheck=currentScore;
}

gameTime++;

spawnInterval=Math.max(80,240-gameTime*0.05);
spawnTimer++;

if(spawnTimer>spawnInterval/16){
spawnEnemy();
spawnTimer=0;
}

globalSpeed=Math.min(globalSpeed+0.002,6);

updateHUD();

requestAnimationFrame(update);
}

function showRevive(){
const revive=document.getElementById("reviveText");
revive.style.display="block";
setTimeout(()=>{revive.style.display="none";},800);
}

function gameOver(){
gameRunning=false;

if(score>highScore){
highScore=Math.floor(score);
localStorage.setItem("neonHighScore",highScore);
}

document.getElementById("finalScore").innerText=
"FINAL SCORE:"+Math.floor(score)+" HIGH:"+highScore;

document.getElementById("gameOver").classList.remove("hidden");
}

function startGame(){
document.getElementById("startScreen").classList.add("hidden");
initGame();
gameRunning=true;
lastMouseX=null;
update();
}

function restartGame(){
document.getElementById("gameOver").classList.add("hidden");
initGame();
gameRunning=true;
update();
}

</script>
</body>
</html>
