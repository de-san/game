<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Dodge X FINAL</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: sans-serif;
    color: white;
}

canvas { display: block; }

.overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
}
.hidden { display: none; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="startScreen" class="overlay">
    <h1>NEON DODGE X</h1>
    <p>
        左右だけで回避せよ<br>
        フェイントあり
    </p>
    <button onclick="startGame()">START</button>
</div>

<div id="gameOver" class="overlay hidden">
    <h1>GAME OVER</h1>
    <button onclick="restartGame()">RESTART</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let player;
let enemies;
let gameRunning = false;
let speed;
let enemyInterval;

function initGame() {
    player = {
        x: canvas.width / 2,
        y: canvas.height - 60,
        size: 30
    };
    enemies = [];
    speed = 6;
}

function spawnEnemy() {
    if (!gameRunning) return;

    let size = 30;
    enemies.push({
        x: Math.random() * canvas.width,
        y: -size,
        size: size,
        isFeint: Math.random() < 0.3,
        feinted: false
    });
}

/* ===== 横差分制御 ===== */

let lastMouseX = null;

canvas.addEventListener("mousemove", (e) => {
    if (!gameRunning) return;

    if (lastMouseX !== null) {
        let dx = e.clientX - lastMouseX;
        player.x += dx;
    }

    lastMouseX = e.clientX;
});

canvas.addEventListener("mouseleave", () => {
    lastMouseX = null;
});

canvas.addEventListener("touchmove", (e) => {
    if (!gameRunning) return;
    e.preventDefault();

    let touchX = e.touches[0].clientX;

    if (lastMouseX !== null) {
        let dx = touchX - lastMouseX;
        player.x += dx;
    }

    lastMouseX = touchX;
});

/* ===== ゲームループ ===== */

function update() {
    if (!gameRunning) return;

    // 縦は完全固定
    player.y = canvas.height - 60;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 端制限
    if (player.x < player.size/2) player.x = player.size/2;
    if (player.x > canvas.width - player.size/2)
        player.x = canvas.width - player.size/2;

    // プレイヤー
    ctx.fillStyle = "cyan";
    ctx.fillRect(
        player.x - player.size/2,
        player.y - player.size/2,
        player.size,
        player.size
    );

    // 敵
    ctx.fillStyle = "red";
    enemies.forEach((enemy, index) => {
        enemy.y += speed;

        // フェイント
        if (enemy.isFeint && !enemy.feinted && enemy.y > canvas.height/3) {
            enemy.x += (Math.random() - 0.5) * 200;
            enemy.feinted = true;
        }

        ctx.beginPath();
        ctx.arc(enemy.x, enemy.y, enemy.size/2, 0, Math.PI*2);
        ctx.fill();

        let dx = player.x - enemy.x;
        let dy = player.y - enemy.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if (dist < player.size/2 + enemy.size/2) {
            gameRunning = false;
            document.getElementById("gameOver").classList.remove("hidden");
        }

        if (enemy.y > canvas.height)
            enemies.splice(index, 1);
    });

    speed += 0.004;

    requestAnimationFrame(update);
}

function startGame() {
    document.getElementById("startScreen").classList.add("hidden");
    initGame();
    gameRunning = true;
    lastMouseX = null;
    enemyInterval = setInterval(spawnEnemy, 550);
    update();
}

function restartGame() {
    document.getElementById("gameOver").classList.add("hidden");
    initGame();
    gameRunning = true;
    lastMouseX = null;
    update();
}
</script>

</body>
</html>
