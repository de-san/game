<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON DODGE X</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:sans-serif;
}

canvas{
display:block;
}

.overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
max-width:500px;
}

button{
margin-top:20px;
padding:10px 25px;
font-size:18px;
}

.hidden{display:none;}

.hud{
position:absolute;
top:10px;
left:10px;
font-size:16px;
}

.reviveText{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
color:lime;
display:none;
}
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>

<div id="reviveText" class="reviveText">REVIVE!</div>

<div id="startScreen" class="overlay">

<h1>NEON DODGE X</h1>

<p>
マウス / 指で左右移動<br>
赤い敵を避ける<br>
黄色アイテムでシールド（最大3）<br>
被弾時50%で復活＋5秒無敵<br>
紫の敵は爆発弾<br>
スコア50ごとに警告付き即死敵
</p>

<button onclick="startGame()">START</button>

</div>

<div id="gameOver" class="overlay hidden">

<h1>GAME OVER</h1>

<p id="finalScore"></p>

<button onclick="restartGame()">RESTART</button>

</div>

<div class="hud" id="hud">
SCORE:0
</div>

<script>

const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let player,enemies,items,bullets,killerEnemies;

let gridOffset=0;

let gameRunning=false;
let lastMouseX=null;

let score=0;
let highScore=0;

let shieldCount=0;
const MAX_SHIELD=3;

let globalSpeed=1.6;

let spawnTimer=0;
let spawnInterval=240;
let gameTime=0;

let isInvincible=false;
let invincibleTimer=0;

let lastScoreCheck=0;

function initGame(){

player={
x:canvas.width/2,
y:canvas.height-60,
size:30
};

enemies=[];
items=[];
bullets=[];
killerEnemies=[];

score=0;
shieldCount=0;

globalSpeed=1.6;

spawnTimer=0;
spawnInterval=240;
gameTime=0;

isInvincible=false;
invincibleTimer=0;

lastScoreCheck=0;

highScore=localStorage.getItem("neonHighScore")||0;

updateHUD();
}

function updateHUD(){
document.getElementById("hud").innerText=
"SCORE:"+Math.floor(score)+" HIGH:"+highScore+" SHIELD:"+shieldCount+"/3";
}

function spawnEnemy(){

if(enemies.length>100)return;

let spawnCount=Math.min(4,1+Math.floor(gameTime/1400));

for(let i=0;i<spawnCount;i++){

let size=16+Math.random()*22;

let type="normal";
if(Math.random()<0.08) type="burst";

enemies.push({
x:Math.random()*canvas.width,
y:-size-Math.random()*200,

size:size,
type:type,
exploded:false,

baseSpeed:(5+Math.random()*3)*(28/size),

speedFactor:0.06+Math.random()*0.04,

isFeint:Math.random()<0.6,
feinted:false,
feintPower:(Math.random()*240)-120
});
}

if(Math.random()<0.15){

items.push({
x:Math.random()*canvas.width,
y:-20,
size:20,
speed:4
});

}
}

/* 爆発弾（スコアで増加） */

function spawnBurst(enemy){

let count=6+Math.floor(score/60);
count=Math.min(count,20);

for(let i=0;i<count;i++){

let angle=(Math.PI*2/count)*i;

bullets.push({
x:enemy.x,
y:enemy.y,
vx:Math.cos(angle)*5.5,
vy:Math.sin(angle)*5.5,
size:5
});
}
}

/* 即死敵（警告0.5秒） */

function spawnKillerEnemy(){

killerEnemies.push({
x:Math.random()*canvas.width,
y:-20,
size:10,
speed:60,
warning:true,
timer:30
});
}

canvas.addEventListener("mousemove",e=>{

if(!gameRunning)return;

const rect=canvas.getBoundingClientRect();
let currentX=e.clientX-rect.left;

if(lastMouseX!==null){
player.x+=currentX-lastMouseX;
}

lastMouseX=currentX;

});

canvas.addEventListener("mouseleave",()=>lastMouseX=null);

canvas.addEventListener("touchmove",e=>{

if(!gameRunning)return;

e.preventDefault();

const rect=canvas.getBoundingClientRect();
let touchX=e.touches[0].clientX-rect.left;

if(lastMouseX!==null){
player.x+=touchX-lastMouseX;
}

lastMouseX=touchX;

});

/* メインループ */

function update(){

if(!gameRunning)return;

ctx.clearRect(0,0,canvas.width,canvas.height);

/* ネオングリッド */

gridOffset+=0.5;

ctx.strokeStyle="rgba(0,255,255,0.12)";
ctx.lineWidth=1;

let size=60;

for(let x=0;x<canvas.width;x+=size){
ctx.beginPath();
ctx.moveTo(x,0);
ctx.lineTo(x,canvas.height);
ctx.stroke();
}

for(let y=-size;y<canvas.height+size;y+=size){
ctx.beginPath();
ctx.moveTo(0,y+gridOffset%size);
ctx.lineTo(canvas.width,y+gridOffset%size);
ctx.stroke();
}

player.y=canvas.height-60;

if(player.x<player.size/2)player.x=player.size/2;
if(player.x>canvas.width-player.size/2)
player.x=canvas.width-player.size/2;

if(isInvincible) ctx.fillStyle="white";
else if(shieldCount>0) ctx.fillStyle="yellow";
else ctx.fillStyle="cyan";

ctx.fillRect(player.x-player.size/2,player.y-player.size/2,player.size,player.size);

/* スコア */

score+=0.12;
let currentScore=Math.floor(score);

if(currentScore%50===0 && currentScore!==0 && currentScore!==lastScoreCheck){
spawnKillerEnemy();
lastScoreCheck=currentScore;
}

gameTime++;
spawnInterval=Math.max(80,240-gameTime*0.05);

spawnTimer++;

if(spawnTimer>spawnInterval/16){
spawnEnemy();
spawnTimer=0;
}

globalSpeed+=0.002;

updateHUD();

requestAnimationFrame(update);

}

/* REVIVE表示 */

function showRevive(){

const revive=document.getElementById("reviveText");

revive.style.display="block";

setTimeout(()=>{
revive.style.display="none";
},800);

}

function gameOver(){

gameRunning=false;

if(score>highScore){
highScore=Math.floor(score);
localStorage.setItem("neonHighScore",highScore);
}

document.getElementById("finalScore").innerText=
"FINAL SCORE:"+Math.floor(score)+" HIGH:"+highScore;

document.getElementById("gameOver").classList.remove("hidden");

}

function startGame(){

document.getElementById("startScreen").classList.add("hidden");

initGame();

gameRunning=true;

lastMouseX=null;

update();

}

function restartGame(){

document.getElementById("gameOver").classList.add("hidden");

initGame();

gameRunning=true;

update();

}

</script>

</body>
</html>
