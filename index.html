<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON DODGE X - CHAOS</title>

<style>
body {
    margin:0;
    overflow:hidden;
    background:black;
    color:white;
    font-family:sans-serif;
}
canvas { display:block; }

.overlay {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

button {
    margin-top:15px;
    padding:10px 20px;
    font-size:16px;
}

.hidden { display:none; }

.hud {
    position:absolute;
    top:10px;
    left:10px;
    font-size:14px;
    opacity:0.8;
}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="startScreen" class="overlay">
    <h1>NEON DODGE X</h1>
    <p>【操作方法】</p>
    <p>PC：マウスを左右に動かす</p>
    <p>スマホ：画面を左右にスワイプ</p>
    <p>※プレイヤーは横移動のみ</p>
    <button onclick="startGame()">START</button>
</div>

<div id="gameOver" class="overlay hidden">
    <h1>GAME OVER</h1>
    <button onclick="restartGame()">RESTART</button>
</div>

<div class="hud" id="hud">
    操作：左右移動のみ
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let player, enemies, globalSpeed;
let gameRunning = false;
let enemyInterval;
let lastMouseX = null;

/* 初期化 */
function initGame(){
    player = {
        x: canvas.width/2,
        y: canvas.height-60,
        size: 30
    };
    enemies = [];
    globalSpeed = 2;
}

/* 敵生成 */
function spawnEnemy(){
    if(!gameRunning) return;
    if(enemies.length > 80) return;

    for(let i=0;i<3;i++){

        let size = 26;

        enemies.push({
            x: Math.random()*canvas.width,
            y: -size - Math.random()*200,
            size: size,

            baseSpeed: 4 + Math.random()*4,
            speedFactor: Math.random()*0.05,

            isFeint: Math.random() < 0.6,
            feinted:false,
            feintPower:(Math.random()*400)-200,

            hasVerticalFeint: Math.random() < 0.5,
            vFeinted:false,
            vTimer:0
        });
    }
}

/* 横移動（差分制御） */
canvas.addEventListener("mousemove", e=>{
    if(!gameRunning) return;

    const rect = canvas.getBoundingClientRect();
    let currentX = e.clientX - rect.left;

    if(lastMouseX !== null){
        player.x += currentX - lastMouseX;
    }
    lastMouseX = currentX;
});

canvas.addEventListener("mouseleave", ()=> lastMouseX=null);

canvas.addEventListener("touchmove", e=>{
    if(!gameRunning) return;
    e.preventDefault();

    const rect = canvas.getBoundingClientRect();
    let touchX = e.touches[0].clientX - rect.left;

    if(lastMouseX !== null){
        player.x += touchX - lastMouseX;
    }
    lastMouseX = touchX;
});

/* ゲームループ */
function update(){
    if(!gameRunning) return;

    player.y = canvas.height-60;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    /* 横制限 */
    if(player.x < player.size/2)
        player.x = player.size/2;

    if(player.x > canvas.width-player.size/2)
        player.x = canvas.width-player.size/2;

    /* プレイヤー描画 */
    ctx.fillStyle="cyan";
    ctx.fillRect(
        player.x-player.size/2,
        player.y-player.size/2,
        player.size,
        player.size
    );

    ctx.fillStyle="red";

    for(let i=enemies.length-1;i>=0;i--){

        let enemy = enemies[i];

        let dynamicSpeed =
            enemy.baseSpeed +
            Math.sin(enemy.y * enemy.speedFactor) * 2;

        if(enemy.hasVerticalFeint && !enemy.vFeinted && enemy.y > canvas.height/4){
            enemy.vFeinted = true;
            enemy.vTimer = 15;
        }

        if(enemy.vTimer > 0){
            dynamicSpeed *= 0.2;
            enemy.vTimer--;
        }
        else if(enemy.vFeinted){
            dynamicSpeed *= 2.5;
        }

        enemy.y += dynamicSpeed + globalSpeed;

        if(enemy.isFeint && !enemy.feinted && enemy.y > canvas.height/3){
            enemy.x += enemy.feintPower;
            enemy.feinted = true;
        }

        ctx.beginPath();
        ctx.arc(enemy.x, enemy.y, enemy.size/2, 0, Math.PI*2);
        ctx.fill();

        let dx = player.x - enemy.x;
        let dy = player.y - enemy.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if(dist < player.size/2 + enemy.size/2){
            gameRunning = false;
            document.getElementById("gameOver").classList.remove("hidden");
        }

        if(enemy.y > canvas.height)
            enemies.splice(i,1);
    }

    globalSpeed += 0.002;

    requestAnimationFrame(update);
}

/* 開始 */
function startGame(){
    document.getElementById("startScreen").classList.add("hidden");
    initGame();
    gameRunning = true;
    lastMouseX = null;
    enemyInterval = setInterval(spawnEnemy, 300);
    update();
}

/* リスタート */
function restartGame(){
    document.getElementById("gameOver").classList.add("hidden");
    initGame();
    gameRunning = true;
    lastMouseX = null;
    update();
}
</script>

</body>
</html>
