<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Dodge X HARD</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    touch-action: none;
    font-family: sans-serif;
    color: white;
}

canvas { display: block; }

.overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
}

.hidden { display: none; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="startScreen" class="overlay">
    <h1>NEON DODGE X</h1>
    <p>
        💻 マウス左右移動<br>
        📱 指で左右スワイプ<br><br>
        🔴 赤玉の中にはフェイントあり
    </p>
    <button onclick="startGame()">START</button>
</div>

<div id="gameOver" class="overlay hidden">
    <h1>GAME OVER</h1>
    <button onclick="restartGame()">RESTART</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let player;
let enemies;
let gameRunning = false;
let speed = 5;          // 初期スピードUP
let enemyInterval;

function initGame() {
    player = {
        x: canvas.width / 2,
        y: canvas.height - 60,
        size: 30
    };
    enemies = [];
    speed = 5;
}

function spawnEnemy() {
    if (!gameRunning) return;

    let size = 30;
    let x = Math.random() * canvas.width;
    let y = -size;

    // 30%の確率でフェイント敵
    let isFeint = Math.random() < 0.3;

    enemies.push({
        x,
        y,
        size,
        isFeint,
        feinted: false
    });
}

canvas.addEventListener("mousemove", (e) => {
    player.x = e.clientX;
});

canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();
    let touch = e.touches[0];
    player.x = touch.clientX;
});

function update() {
    if (!gameRunning) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 画面端制限
    if (player.x < player.size/2) player.x = player.size/2;
    if (player.x > canvas.width - player.size/2) player.x = canvas.width - player.size/2;

    // プレイヤー
    ctx.fillStyle = "cyan";
    ctx.shadowBlur = 20;
    ctx.shadowColor = "cyan";
    ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);
    ctx.shadowBlur = 0;

    // 敵
    ctx.fillStyle = "red";

    enemies.forEach((enemy, index) => {
        enemy.y += speed;

        // フェイント処理（画面中央あたりで横ズレ）
        if (enemy.isFeint && !enemy.feinted && enemy.y > canvas.height / 3) {
            enemy.x += (Math.random() - 0.5) * 200; // 横に大きくズレる
            enemy.feinted = true;
        }

        ctx.beginPath();
        ctx.arc(enemy.x, enemy.y, enemy.size/2, 0, Math.PI * 2);
        ctx.fill();

        let dx = player.x - enemy.x;
        let dy = player.y - enemy.y;
        let distance = Math.sqrt(dx*dx + dy*dy);

        if (distance < player.size/2 + enemy.size/2) {
            gameRunning = false;
            document.getElementById("gameOver").classList.remove("hidden");
        }

        if (enemy.y > canvas.height) {
            enemies.splice(index, 1);
        }
    });

    speed += 0.003;  // 速度増加幅UP（後半かなり速い）
    requestAnimationFrame(update);
}

function startGame() {
    document.getElementById("startScreen").classList.add("hidden");
    initGame();
    gameRunning = true;
    enemyInterval = setInterval(spawnEnemy, 600);
    update();
}

function restartGame() {
    document.getElementById("gameOver").classList.add("hidden");
    initGame();
    gameRunning = true;
    update();
}
</script>

</body>
</html>
